version: "3.9"

services:
  backend:
    build: .
    container_name: nba-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/nba_stats_phase1
    depends_on:
      - mongo

  frontend:
    build: ./client
    container_name: nba-frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

  nginx:
    image: nginx:latest
    container_name: nba-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  mongo:
    image: mongo:latest
    container_name: nba-mongo
    ports:
      - "27017:27017"